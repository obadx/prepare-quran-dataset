# Test moshaf IDs (optional)
test_moshaf_ids:
  - "19.0"
  - "29.0"
  - "30.0"
  # - "26.1"


# Loss
loss_weights:
  phonemes: 0.4
  shidda_or_rakhawa: 0.0605
  tafkheem_or_taqeeq: 0.0605


# Augmentaion
augment_prob: 0.4
max_audio_seconds: 20.0

# Model dropout
dropout: 0.1

# Model architecture (defaults match w2v-bert-2.0)
num_hidden_layers: 16
hidden_size: 256
output_hidden_size: 256
intermediate_size: 1024
num_attention_heads: 4

# Training parameters
num_epochs: 10
learning_rate: 5e-5
seed: 42

# Batch sizes
per_device_train_batch_size: 32
pre_device_eval_batch_size: 64

# Dataset parameters
devset_ratio: 0.1
save_every: 0.1

# Hardware settings
# num_workers: 4

# Optimizer settings
weight_decay: 0.01
warmup_ratio: 0.2

# Model saving and evaluation
metric_for_bet_model: "average_per"
greater_is_better: false

hub_model_id: "obadx/muaalem-model-v3-mini"
wandb_project_name: "muaalem-model-v3-mini"

# Gradint checkpointing
gradient_checkpoiniting: true

# Output directory for checkpoints
output_dir: "./results-offline-mini"
