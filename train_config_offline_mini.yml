# Training configuration example
train_moshaf_ids:
  # - "0.0"
  # - "0.1"
  - "0.2"
  # - "0.3"
  - "1.0"
  - "2.0"
  # - "2.1"
  - "3.0"
  - "4.0"
  - "5.0"
  - "6.0"
  - "7.0"
  # - "8.0"
